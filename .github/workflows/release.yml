name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # Use the latest available Xcode for macOS 26 SDK / Liquid Glass support
          ls /Applications/ | grep Xcode | sort -V | tail -5
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version

      - name: Import signing certificate
        env:
          DEVELOPER_ID_CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          CERT_P12=$RUNNER_TEMP/cert.p12
          KEYCHAIN=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASS="ci-build-$(date +%s)"

          echo "$DEVELOPER_ID_CERT_BASE64" | base64 --decode > "$CERT_P12"

          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"

          security import "$CERT_P12" \
            -k "$KEYCHAIN" \
            -P "$DEVELOPER_ID_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PASS" "$KEYCHAIN"

          echo "Installed identities:"
          security find-identity -v -p codesigning "$KEYCHAIN"

          rm -f "$CERT_P12"

      - name: Build archive
        run: |
          xcodebuild archive \
            -project MacScheduler.xcodeproj \
            -scheme MacScheduler \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath $RUNNER_TEMP/MacScheduler.xcarchive \
            CODE_SIGN_IDENTITY="Developer ID Application: Ardax H (Z8QHFH52KV)" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=Z8QHFH52KV

      - name: Export and sign app
        run: |
          mkdir -p $RUNNER_TEMP/export
          cp -R $RUNNER_TEMP/MacScheduler.xcarchive/Products/Applications/*.app $RUNNER_TEMP/export/

          codesign --force --deep \
            --sign "Developer ID Application: Ardax H (Z8QHFH52KV)" \
            --entitlements MacScheduler/MacScheduler.entitlements \
            --options runtime \
            "$RUNNER_TEMP/export/Mac Task Scheduler.app"

          echo "Verifying signature..."
          codesign --verify --verbose=2 "$RUNNER_TEMP/export/Mac Task Scheduler.app"
          spctl --assess --type execute --verbose=2 "$RUNNER_TEMP/export/Mac Task Scheduler.app" || echo "Note: spctl may fail in CI without notarization"

      - name: Create DMG
        run: |
          xattr -cr "$RUNNER_TEMP/export/Mac Task Scheduler.app"

          hdiutil create -volname "Mac Task Scheduler" \
            -srcfolder "$RUNNER_TEMP/export" \
            -ov -format UDZO \
            "$RUNNER_TEMP/MacTaskScheduler.dmg"

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/build.keychain 2>/dev/null || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Mac Task Scheduler ${{ github.ref_name }}"
          body: |
            **Version:** ${{ github.ref_name }}

            **Install:** Download the DMG, open it, and drag the app to your Applications folder.
            **Signed with:** Developer ID Application (Ardax H)
          files: |
            ${{ runner.temp }}/MacTaskScheduler.dmg
          make_latest: true
